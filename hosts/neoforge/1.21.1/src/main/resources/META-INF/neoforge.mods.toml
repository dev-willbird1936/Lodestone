modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
showAsResourcePack = false

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "Lodestone contributors"
