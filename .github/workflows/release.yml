name: Release v1

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Immutable tag to rebuild and publish after a failed release job
        required: true
        default: v1.0.0

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify checked-out immutable release tag
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = '${{ inputs.tag || github.ref_name }}'
          $checkedTag = (git describe --exact-match --tags HEAD).Trim()
          if ($checkedTag -cne $tag) { throw "Checked out $checkedTag instead of requested immutable tag $tag." }

      - id: java8
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '8'
      - id: java17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - id: java21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
      - id: java25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Download checksummed historical Gradle distributions
        id: gradle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tools = Join-Path $env:RUNNER_TEMP 'lodestone-gradle'
          New-Item -ItemType Directory -Force -Path $tools | Out-Null
          function Get-Gradle([string]$version, [string]$sha256) {
            $archive = Join-Path $tools "gradle-$version-bin.zip"
            Invoke-WebRequest -UseBasicParsing "https://services.gradle.org/distributions/gradle-$version-bin.zip" -OutFile $archive
            $actual = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -cne $sha256) { throw "Gradle $version SHA-256 mismatch: $actual" }
            Expand-Archive -LiteralPath $archive -DestinationPath $tools
            return (Join-Path $tools "gradle-$version/bin/gradle.bat")
          }
          "gradle2=$(Get-Gradle '2.7' 'cde43b90945b5304c43ee36e58aab4cc6fb3a3d5f9bd9449bb1709a68371cb06')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "gradle4=$(Get-Gradle '4.10.3' '8626cbf206b4e201ade7b87779090690447054bc93f052954c78480fa6ed186e')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "gradle7=$(Get-Gradle '7.6.4' 'bed1da33cca0f557ab13691c77f38bb67388119e4794d113e051039b80af9bb1')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "gradle9=$(Get-Gradle '9.5.1' 'bafc141b619ad6350fd975fc903156dd5c151998cc8b058e8c1044ab5f7b031f')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Verify Windows PowerShell hash runtime for contract tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $legacyModules = Join-Path $env:WINDIR 'System32\WindowsPowerShell\v1.0\Modules'
          $machineModules = [Environment]::GetEnvironmentVariable('PSModulePath', 'Machine')
          $env:PSModulePath = "$legacyModules;$machineModules"
          & powershell.exe -NoLogo -NoProfile -NonInteractive -Command '$PSVersionTable.PSVersion; Get-Command Get-FileHash -ErrorAction Stop | Select-Object -ExpandProperty Source'
          if ($LASTEXITCODE -ne 0) { throw "Windows PowerShell Get-FileHash preflight failed with exit $LASTEXITCODE." }

      - name: Full source, unit, gateway, adapter, and contract verification
        shell: pwsh
        env:
          JAVA_HOME: ${{ steps.java21.outputs.path }}
        run: |
          $ErrorActionPreference = 'Stop'
          # setup-java's last installation is Java 25 for the isolated Fabric 26.2
          # build. Gradle 8.14 cannot run this historical contract on that runtime;
          # select the explicit Java 21 installation inside the step rather than
          # relying on the job-level JAVA_HOME mutation order.
          $env:JAVA_HOME = $env:JAVA_HOME_21_X64
          if ([string]::IsNullOrWhiteSpace($env:JAVA_HOME) -or
                  -not (Test-Path -LiteralPath (Join-Path $env:JAVA_HOME 'bin/java.exe'))) {
            throw "Java 21 toolchain is unavailable: $env:JAVA_HOME"
          }
          $env:Path = "$(Join-Path $env:JAVA_HOME 'bin');$env:Path"
          & java.exe -version
          # The immutable tag's Java contract runner launches powershell.exe.
          # pwsh's default PSModulePath omits Windows PowerShell utility modules.
          $legacyModules = Join-Path $env:WINDIR 'System32\WindowsPowerShell\v1.0\Modules'
          $machineModules = [Environment]::GetEnvironmentVariable('PSModulePath', 'Machine')
          $env:PSModulePath = "$legacyModules;$machineModules"
          .\gradlew.bat projects check --no-parallel

      # The immutable tag cannot be rewritten to add diagnostics.  On a retry,
      # preserve the failing contract's captured subprocess output in the run log
      # so a release blocker can be corrected without weakening its gate.
      - name: Print failed release-contract details
        if: failure()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $reports = @(Get-ChildItem -LiteralPath $env:GITHUB_WORKSPACE -Recurse -Filter 'TEST-*.xml' -File |
              Where-Object { $_.FullName -match '[\\/]build[\\/]test-results[\\/]test[\\/]' })
          if ($reports.Count -eq 0) {
            Write-Output 'No JUnit XML reports were retained; preserving the original failed gate.'
            exit 0
          }
          foreach ($report in $reports) {
            Get-Content -LiteralPath $report.FullName -Raw
          }

      - name: Rebuild all release artifacts twice where required
        # v1.0.0's immutable historical profile stagers target Windows PowerShell.
        # The final staged ZIPs are still checked byte-for-byte against certification.
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          # v1.0.0's source tag is immutable. Its Fabric 1.18.2 profile stager
          # predates PS7-safe POM parsing, so use the audited workflow revision's
          # portability-only stager for this rebuild, then restore the exact tag
          # before clean-tree assembly. The final profile ZIP must still match C0.
          $relativeStager = 'verification/curseforge-profiles/stage-fabric-1182-profile.ps1'
          # Pinned to the reviewed control snapshot, never a mutable branch.
          $controlCommit = '1966227c7e7c9cc3e990afc4f00ac2e0bde6ce8e'
          $controlTree = 'fb59cd459067cdeef2f26a024b559b28730e569a'
          $expectedStagerBlob = '21cdd0ed344d23b68a4e3e385fa077b5a9e5752c'
          git fetch --no-tags origin $controlCommit
          if ((git rev-parse "$controlCommit`^{tree}").Trim() -cne $controlTree) {
            throw "Pinned release control tree does not match expected value: $controlCommit"
          }
          if ((git rev-parse "$controlCommit`:$relativeStager").Trim() -cne $expectedStagerBlob) {
            throw "Pinned release stager blob does not match expected value: $expectedStagerBlob"
          }
          $stager = @(git show "$controlCommit`:$relativeStager")
          if ($LASTEXITCODE -ne 0 -or $stager.Count -eq 0) { throw "Cannot read audited portability stager from $controlCommit." }
          $stagerPath = Join-Path $env:GITHUB_WORKSPACE $relativeStager
          [IO.File]::WriteAllText($stagerPath, (($stager -join "`n") + "`n"), [Text.UTF8Encoding]::new($false))
          try {
            & .\verification\build-v1-release.ps1 `
              -Java8 "${{ steps.java8.outputs.path }}\bin\java.exe" `
              -Java17 "${{ steps.java17.outputs.path }}\bin\java.exe" `
              -Java21 "${{ steps.java21.outputs.path }}\bin\java.exe" `
              -Java25 "${{ steps.java25.outputs.path }}\bin\java.exe" `
              -Gradle2 "${{ steps.gradle.outputs.gradle2 }}" `
              -Gradle4 "${{ steps.gradle.outputs.gradle4 }}" `
              -Gradle7 "${{ steps.gradle.outputs.gradle7 }}" `
              -Gradle9 "${{ steps.gradle.outputs.gradle9 }}"
            if ($LASTEXITCODE -ne 0) { throw "Release artifact rebuild failed with exit $LASTEXITCODE." }
          } finally {
            git restore --source=HEAD --worktree -- $relativeStager
            if ($LASTEXITCODE -ne 0) { throw "Could not restore immutable tag stager $relativeStager." }
            # A text diff and ordinary git hash-object both accept clean/smudge
            # filtering. The certification snapshot hashes raw bytes, so stream the
            # immutable Git blob itself back into the worktree without a text filter.
            $rawStager = [IO.Path]::GetTempFileName()
            try {
              $start = New-Object System.Diagnostics.ProcessStartInfo
              $start.FileName = 'git'
              $start.Arguments = "cat-file blob `"HEAD:$relativeStager`""
              $start.UseShellExecute = $false
              $start.RedirectStandardOutput = $true
              $start.RedirectStandardError = $true
              $process = [Diagnostics.Process]::Start($start)
              $output = [IO.File]::Open($rawStager, [IO.FileMode]::Create, [IO.FileAccess]::Write, [IO.FileShare]::None)
              try { $process.StandardOutput.BaseStream.CopyTo($output) } finally { $output.Dispose() }
              $stderr = $process.StandardError.ReadToEnd()
              $process.WaitForExit()
              if ($process.ExitCode -ne 0) { throw "Could not read immutable tag stager bytes: $stderr" }
              [IO.File]::Copy($rawStager, $stagerPath, $true)
            } finally {
              if (Test-Path -LiteralPath $rawStager) { Remove-Item -LiteralPath $rawStager -Force }
            }
          }
          $expectedStagerBlob = (git rev-parse "HEAD:$relativeStager").Trim()
          $actualStagerBlob = (git hash-object --no-filters -- $relativeStager).Trim()
          if ($LASTEXITCODE -ne 0 -or $actualStagerBlob -cne $expectedStagerBlob) {
            throw "Recovered stager raw bytes do not match immutable tag $relativeStager."
          }
          git diff --exit-code -- $relativeStager

      - name: Verify and stage the exact tagged release
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $relativeAssembler = 'verification/assemble-v1-release.ps1'
          # Keep the release procedure reproducible across retries of v1.0.0.
          $controlCommit = '1966227c7e7c9cc3e990afc4f00ac2e0bde6ce8e'
          $controlTree = 'fb59cd459067cdeef2f26a024b559b28730e569a'
          $expectedAssemblerBlob = '6904080b0b287daa3c95b51c7b03f1164f99fa45'
          $expectedStagerBlob = '21cdd0ed344d23b68a4e3e385fa077b5a9e5752c'
          git fetch --no-tags origin $controlCommit
          if ((git rev-parse "$controlCommit`^{tree}").Trim() -cne $controlTree) {
            throw "Pinned release control tree does not match expected value: $controlCommit"
          }
          if ((git rev-parse "$controlCommit`:$relativeAssembler").Trim() -cne $expectedAssemblerBlob) {
            throw "Pinned release assembler blob does not match expected value: $expectedAssemblerBlob"
          }
          $assembler = @(git show "$controlCommit`:$relativeAssembler")
          if ($LASTEXITCODE -ne 0 -or $assembler.Count -eq 0) {
            throw "Cannot read audited release assembler from $controlCommit."
          }
          $assemblerPath = Join-Path $env:GITHUB_WORKSPACE $relativeAssembler
          [IO.File]::WriteAllText($assemblerPath, (($assembler -join "`n") + "`n"), [Text.UTF8Encoding]::new($false))
          try {
            & .\verification\assemble-v1-release.ps1 -Mode Assemble `
              -StagingDirectory "$env:RUNNER_TEMP\lodestone-v1.0.0-release" `
              -AllowReleaseToolOverlay `
              -ReleaseToolCommit $controlCommit `
              -ReleaseToolTree $controlTree `
              -ReleaseToolAssemblerBlob $expectedAssemblerBlob `
              -ReleaseToolStagerBlob $expectedStagerBlob
            if ($LASTEXITCODE -ne 0) { throw "Release assembly failed with exit $LASTEXITCODE." }
          } finally {
            git restore --source=HEAD --worktree -- $relativeAssembler
            if ($LASTEXITCODE -ne 0) { throw "Could not restore immutable tag assembler $relativeAssembler." }
          }
          git diff --exit-code -- $relativeAssembler

      - name: Draft, verify, and publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = '${{ inputs.tag || github.ref_name }}'
          if ($tag -ne 'v1.0.0') { throw "This release pipeline only publishes v1.0.0, not $tag." }
          $existingJson = gh release view $tag --repo $env:GITHUB_REPOSITORY --json isDraft,assets 2>$null
          $existing = $LASTEXITCODE -eq 0
          $existingRelease = if ($existing) { $existingJson | ConvertFrom-Json } else { $null }
          $stage = Join-Path $env:RUNNER_TEMP 'lodestone-v1.0.0-release'
          $assets = @(Get-ChildItem -LiteralPath $stage -File | Sort-Object Name)
          if ($assets.Count -ne 36) { throw "Expected 36 staged release files, found $($assets.Count)." }
          $assetPaths = @($assets | ForEach-Object { $_.FullName })

          if ($existing) {
            if (-not $existingRelease.isDraft -and @($existingRelease.assets).Count -ne $assets.Count) {
              throw "Published release $tag asset count differs from staging inventory."
            }
            $remoteNames = @($existingRelease.assets | ForEach-Object name | Sort-Object)
            $stageNames = @($assets | ForEach-Object Name | Sort-Object)
            if (($remoteNames -join "`n") -cne ($stageNames -join "`n")) {
              throw "Existing release $tag asset filenames differ from staging inventory."
            }
            Write-Output "Existing release $tag found; verifying its immutable uploaded bytes without replacing it."
          } else {
            # A failed upload intentionally leaves an inaccessible draft for inspection;
            # no public release exists until the downloaded byte-for-byte verification passes.
            gh release create $tag $assetPaths --repo $env:GITHUB_REPOSITORY --verify-tag `
              --draft --title 'Lodestone v1.0.0' --generate-notes

            $draft = gh release view $tag --repo $env:GITHUB_REPOSITORY --json isDraft,assets | ConvertFrom-Json
            if (-not $draft.isDraft) { throw "Release $tag was not retained as a draft for verification." }
            if (@($draft.assets).Count -ne $assets.Count) { throw "Draft asset count differs from staging inventory." }
            $draftNames = @($draft.assets | ForEach-Object name | Sort-Object)
            $stageNames = @($assets | ForEach-Object Name | Sort-Object)
            if (($draftNames -join "`n") -cne ($stageNames -join "`n")) { throw 'Draft asset filenames differ from staging inventory.' }
          }

          $download = Join-Path $env:RUNNER_TEMP 'lodestone-v1.0.0-upload-verify'
          New-Item -ItemType Directory -Path $download | Out-Null
          gh release download $tag --repo $env:GITHUB_REPOSITORY --dir $download --pattern '*' --clobber
          $downloaded = @(Get-ChildItem -LiteralPath $download -File | Sort-Object Name)
          if ($downloaded.Count -ne $assets.Count) { throw "Downloaded asset count differs from staging inventory." }
          foreach ($asset in $assets) {
            $remotePath = Join-Path $download $asset.Name
            if (-not (Test-Path -LiteralPath $remotePath -PathType Leaf)) { throw "Downloaded release is missing $($asset.Name)." }
            $remote = Get-Item -LiteralPath $remotePath
            if ($remote.Length -ne $asset.Length) { throw "Downloaded byte length differs for $($asset.Name)." }
            $localHash = (Get-FileHash -LiteralPath $asset.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            $remoteHash = (Get-FileHash -LiteralPath $remotePath -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($remoteHash -cne $localHash) { throw "Downloaded SHA-256 differs for $($asset.Name)." }
          }

          if (-not $existing) {
            gh release edit $tag --repo $env:GITHUB_REPOSITORY --draft=false
          }
          $published = gh release view $tag --repo $env:GITHUB_REPOSITORY --json isDraft,assets | ConvertFrom-Json
          if ($published.isDraft -or @($published.assets).Count -ne $assets.Count) {
            throw "Release $tag did not publish its verified complete inventory."
          }
